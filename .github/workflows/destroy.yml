name: Destroy

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Determine stack name
        id: stack
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "stack_name=chickens-vs-kinser-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "Destroy is only supported for pull_request events"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.DEPLOY_ROLE }}

      - run: ./deploy/destroy.sh "${{ steps.stack.outputs.stack_name }}"
