name: Misc
description: Track maintenance, tooling, cleanup, or non-feature work
title: "[Misc]: "
labels: ["misc", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why does this need to happen?
    validations:
      required: true

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      description: What must be true for this to be considered complete?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      description: Fibonacci sizing
      options:
        - 1
        - 2
        - 3
        - 5
        - 8
        - 13
    validations:
      required: true

  - type: input
    id: sprint
    attributes:
      label: Sprint / iteration

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add links, context, or implementation notes
