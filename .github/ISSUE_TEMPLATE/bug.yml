name: Bug
description: Report a defect or broken behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      description: Fibonacci sizing
      options:
        - 1
        - 2
        - 3
        - 5
        - 8
        - 13
    validations:
      required: true

  - type: input
    id: sprint
    attributes:
      label: Sprint / iteration

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or add links/screenshots if available
